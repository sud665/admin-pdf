services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: joya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/joya
      FONT_DIR: /app/fonts
      IMAGE_DIR: /app/images
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./fonts:/app/fonts
      - ./images:/app/images

volumes:
  pgdata:
